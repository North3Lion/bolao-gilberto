<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Oficial | Gilberto Contabilidade</title>
    
    <!-- Fontes Esportivas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --card-bg: rgba(13, 17, 23, 0.88);
            --gold-light: #fbe68e;
            --gold-main: #eab308;
            --gold-dark: #ca8a04;
            --br-green: #009c3b;
            --no-red: #ef2b2d;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #05080a;
            
            /* ==================================================================== */
            /* 1. COLOQUE O LINK DA IMAGEM DE FUNDO DO SITE (ESTÁDIO) AQUI ABAIXO   */
            /* ==================================================================== */
            background-image: 
                linear-gradient(rgba(5, 8, 12, 0.6), rgba(5, 8, 12, 0.8)), 
                url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Estadio_do_Maracana_em_2013.jpg/1920px-Estadio_do_Maracana_em_2013.jpg'); 
            
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .betting-board {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 20px rgba(234, 179, 8, 0.15);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }

        .header-sponsor {
            text-align: center;
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sponsor-subtitle { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .sponsor-title { font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 900; color: var(--gold-main); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 15px rgba(234, 179, 8, 0.3); display: flex; justify-content: center; align-items: center; gap: 15px; }

        .match-arena { display: flex; position: relative; height: 300px; border-bottom: 2px solid rgba(255, 255, 255, 0.1); background-color: #000; }

        .team-side { flex: 1; position: relative; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 30px; background-size: cover; background-repeat: no-repeat; }

        .side-brazil {
            /* ==================================================================== */
            /* 2. COLOQUE O LINK DA IMAGEM DO LADO DO BRASIL (VINI JR) AQUI ABAIXO  */
            /* ==================================================================== */
            background-image: 
                linear-gradient(180deg, rgba(0, 156, 59, 0.65) 0%, #000000 95%),
                url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Vinicius_Jr_2023.jpg/800px-Vinicius_Jr_2023.jpg');
            background-position: center 15%;
        }

        .side-norway {
            /* ==================================================================== */
            /* 3. COLOQUE O LINK DA IMAGEM DO LADO DA NORUEGA (HAALAND) AQUI ABAIXO */
            /* ==================================================================== */
            background-image: 
                linear-gradient(180deg, rgba(239, 43, 45, 0.65) 0%, #000000 95%),
                url('https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Erling_Haaland_2023_%28cropped%29.jpg/800px-Erling_Haaland_2023_%28cropped%29.jpg');
            background-position: center 15%;
        }

        .team-info { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .flag-icon { width: 55px; height: auto; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.9); margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2); }
        .team-name { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 5px 15px rgba(0,0,0,1); color: #fff; }

        .score-box { width: 80px; height: 90px; background: rgba(0, 0, 0, 0.85); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px; color: #fff; font-family: 'Oswald', sans-serif; font-size: 50px; font-weight: 700; text-align: center; box-shadow: inset 0 5px 25px rgba(0,0,0,1), 0 10px 20px rgba(0,0,0,0.5); transition: all 0.3s; }
        .side-brazil .score-box:focus { border-color: var(--br-green); box-shadow: 0 0 25px rgba(0, 156, 59, 0.7); outline: none; }
        .side-norway .score-box:focus { border-color: var(--no-red); box-shadow: 0 0 25px rgba(239, 43, 45, 0.7); outline: none; }

        .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: linear-gradient(135deg, var(--gold-main), var(--gold-dark)); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-family: 'Oswald', sans-serif; font-weight: 900; font-size: 22px; color: #000; z-index: 10; box-shadow: 0 0 30px rgba(234, 179, 8, 0.5), inset 0 2px 5px rgba(255,255,255,0.7); border: 4px solid #000; }

        .data-section { padding: 35px; background: rgba(0, 0, 0, 0.45); }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1.5px; }
        .premium-input { width: 100%; padding: 18px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; color: #fff; font-size: 16px; font-family: 'Montserrat', sans-serif; transition: all 0.3s; box-sizing: border-box; }
        .premium-input option { background-color: #111827; color: #fff; }
        .premium-input:focus { outline: none; border-color: var(--gold-main); background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 15px rgba(234, 179, 8, 0.25); }

        .btn-submit { width: 100%; background: linear-gradient(90deg, var(--gold-main), var(--gold-light), var(--gold-main)); background-size: 200% auto; color: #000; font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; padding: 22px; border: none; border-radius: 12px; cursor: pointer; margin-top: 15px; transition: 0.5s; display: flex; justify-content: center; align-items: center; gap: 12px; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.35); }
        .btn-submit:hover { background-position: right center; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(234, 179, 8, 0.55); }
        
        @media (max-width: 500px) { .sponsor-title { font-size: 24px; } .score-box { width: 65px; height: 80px; font-size: 40px; } .match-arena { height: 260px; } }
    </style>
</head>
<body>

<div class="betting-board">
    <div class="header-sponsor">
        <div class="sponsor-subtitle">Apresentado por</div>
        <div class="sponsor-title">
            <i class="fa-solid fa-trophy"></i> Gilberto Contabilidade <i class="fa-solid fa-trophy"></i>
        </div>
    </div>

    <form id="bolaoForm">
        <div class="match-arena">
            <div class="team-side side-brazil">
                <div class="team-info">
                    <img src="https://flagcdn.com/br.svg" alt="Brasil" class="flag-icon">
                    <div class="team-name">Brasil</div>
                    <input type="number" id="golsBrasil" class="score-box" min="0" required placeholder="0">
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="team-side side-norway">
                <div class="team-info">
                    <img src="https://flagcdn.com/no.svg" alt="Noruega" class="flag-icon">
                    <div class="team-name">Noruega</div>
                    <input type="number" id="golsNoruega" class="score-box" min="0" required placeholder="0">
                </div>
            </div>
        </div>

        <div class="data-section">
            <div class="input-group">
                <label for="nome"><i class="fa-solid fa-user"></i> Nome Completo do Jogador</label>
                <input type="text" id="nome" class="premium-input" required placeholder="Digite seu nome para o ranking...">
            </div>

            <!-- CAMPO DE EMAIL ADICIONADO AQUI -->
            <div class="input-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> E-mail Corporativo</label>
                <!-- Ajuste o placeholder para o e-mail da sua empresa -->
                <input type="email" id="email" class="premium-input" required placeholder="seu.nome@gilbertocontabilidade.com.br">
            </div>

            <div class="input-group">
                <label for="unidade"><i class="fa-solid fa-map-pin"></i> Unidade Gilberto Contabilidade</label>
                <select id="unidade" class="premium-input" required>
                    <option value="" disabled selected>Selecione onde você trabalha...</option>
                    <option value="Gravatá">Gravatá</option>
                    <option value="Recife">Recife</option>
                    <option value="Caruaru">Caruaru</option>
                </select>
            </div>

            <div class="input-group">
                <label for="primeiroGol"><i class="fa-solid fa-bolt"></i> Autor do 1º Gol da Partida</label>
                <input type="text" id="primeiroGol" class="premium-input" required placeholder="Quem vai abrir o placar? (Ex: Vini Jr)">
            </div>

            <button type="submit" class="btn-submit">
                Registrar Palpite Oficial <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </form>
</div>

<!-- Scripts Firebase e EmailJS -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // 1. CHAVES DO EMAIL JS
    emailjs.init("SbHqmPTjA-JB9KIAj");

    // 2. CHAVES DO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDD4c1Polidza2oiOb2hLSjabymbZySz1s",
        authDomain: "bolao-empresa.firebaseapp.com",
        projectId: "bolao-empresa",
        storageBucket: "bolao-empresa.firebasestorage.app",
        messagingSenderId: "580349718040",
        appId: "1:580349718040:web:ef3d469ba351b396a11d6d",
        measurementId: "G-YS8VFCBJJD"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('bolaoForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const emailDigitado = document.getElementById('email').value.trim().toLowerCase();
        const btn = document.querySelector('.btn-submit');
        const originalText = btn.innerHTML;

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> VERIFICANDO...';
        btn.disabled = true;
        btn.style.opacity='0.8';

        btn.innerHTML='<i class="fa-solid fa-circle-notch fa-spin"></i> REGISTRANDO...';

        const dadosPalpite={
                nome: document.getElementById('nome').value.trim(),
                email: emailDigitado,
                unidade: document.getElementById('unidade').value,
                golsBrasil: parseInt(document.getElementById('golsBrasil').value),
                golsNoruega: parseInt(document.getElementById('golsNoruega').value),
                primeiroGol: document.getElementById('primeiroGol').value.trim(),
                dataHora: firebase.firestore.FieldValue.serverTimestamp()
            };

       db.collection("palpites")
          .doc(emailDigitado)
          .set(dadosPalpite)
          .then(()=>dadosPalpite)
        .then((dadosPalpite)=>{
            return emailjs.send('service_ib6kimu','template_90z5cgv',{
                to_email:dadosPalpite.email,
                nome:dadosPalpite.nome,
                resultado_palpite:`Brasil ${dadosPalpite.golsBrasil} x ${dadosPalpite.golsNoruega} Noruega`,
                primeiro_gol:dadosPalpite.primeiroGol
            });
        })
        .then(()=>{
            alert("✅ Sucesso! Seu palpite foi registrado e o e-mail de confirmação foi enviado.");
            document.getElementById('bolaoForm').reset();
        })
        .catch((error)=>{
            if (error.code==="already-exists" || error.code==="6"){alert("⚠️ Este e-mail já realizou um palpite.");} else {console.error(error);alert("⚠️ Ocorreu um erro ao registrar o palpite.");}
        })
        .finally(()=>{
            btn.innerHTML=originalText;
            btn.disabled=false;
            btn.style.opacity='1';
        });
    });
</script>

</body>
</html>
